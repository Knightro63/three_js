name: three_js_ar
description: "Flutter three_js_ar package converted from threejs to support webxr, arkit and arcore.."
version: 0.0.1
homepage: https://github.com/Knightro63/three_js/tree/main/packages/three_js_ar

environment:
  sdk: ^3.8.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# The following section is specific to Flutter packages.
flutter:
  plugin:
    platforms:
      android:
        package: com.example.three_js_ar
        pluginClass: ThreeJsArPlugin
      ios:
        pluginClass: ThreeJsArPlugin
